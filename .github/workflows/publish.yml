name: NPM Publish

env:
  NODE_VERSION: 24

on:
  push:
    tags:
      - v*

jobs:
  publish:
    runs-on: ubuntu-latest

    environment:
      name: npm
      url: https://www.npmjs.com/package/marked-react

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Tests
        run: npm run test

      - name: Publish to NPM
        run: npm publish
